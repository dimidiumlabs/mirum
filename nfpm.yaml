# yaml-language-server: $schema=https://nfpm.goreleaser.com/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

name: mirum
arch: ${ARCH}
version: ${VERSION}
license: AGPL-3.0-or-later
platform: linux
maintainer: Nikolay Govorov <me@govorov.online>
description: Modern CI platform

contents:
  - src: ./LICENSE
    dst: /usr/share/doc/mirum/LICENSE
  - src: ./README.md
    dst: /usr/share/doc/mirum/README.md

  - src: build/mirum-server
    dst: /usr/local/bin/mirum-server
    file_info:
      mode: 0755

  - src: build/mirum-worker
    dst: /usr/local/bin/mirum-worker
    file_info:
      mode: 0755

  - src: pkg/server/config.yaml
    dst: /etc/mirum/server/config.yaml
    type: config|noreplace
    file_info:
      mode: 0640
      owner: root
      group: mirum-server

  - src: pkg/worker/default.yaml
    dst: /etc/mirum/worker/default.yaml
    type: config|noreplace
    file_info:
      mode: 0640
      owner: root
      group: mirum-worker

  - src: pkg/mirum-server.service
    dst: /usr/lib/systemd/system/mirum-server.service
    file_info:
      mode: 0644

  - src: pkg/mirum-worker@.service
    dst: /usr/lib/systemd/system/mirum-worker@.service
    file_info:
      mode: 0644

  - dst: /var/lib/mirum-server
    type: dir
    file_info:
      mode: 0750
      owner: mirum-server
      group: mirum-server

  - dst: /var/lib/mirum-worker
    type: dir
    file_info:
      mode: 0750
      owner: mirum-worker
      group: mirum-worker


scripts:
  preinstall: pkg/scripts/preinstall.sh
  postinstall: pkg/scripts/postinstall.sh
  preremove: pkg/scripts/preremove.sh

deb:
  signature:
    method: debsign
    key_id: ${GPG_KEY_ID}
    key_file: ${SIGNING_PRIVATE_KEY}

rpm:
  group: System Environment/Daemons
  signature:
    key_id: ${GPG_KEY_ID}
    key_file: ${SIGNING_PRIVATE_KEY}
