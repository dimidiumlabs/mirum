version: v2
plugins:
  - local: ["go", "tool", "google.golang.org/protobuf/cmd/protoc-gen-go"]
    out: ../apipb
    opt: paths=source_relative
  - local: ["go", "tool", "connectrpc.com/connect/cmd/protoc-gen-connect-go"]
    out: ../apipb
    opt: paths=source_relative
  - remote: buf.build/bufbuild/es:v2.11.0
    out: ../web/gen
    opt:
      - target=ts
      - import_extension=js
