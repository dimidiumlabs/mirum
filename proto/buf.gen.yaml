version: v2
plugins:
  - local: protoc-gen-go
    out: ../internal/protocol/pb
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: ../internal/protocol/pb
    opt: paths=source_relative
  - remote: buf.build/bufbuild/es:v2.11.0
    out: ../cmd/mirumd/web/gen
    opt:
      - target=ts
      - import_extension=js
