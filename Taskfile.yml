version: "3"

vars:
  BUILD_DIR: build
  DIST_DIR: build/dist
  ARCHES: amd64 arm64 riscv64 ppc64le

env:
  GOEXPERIMENT: runtimesecret

tasks:
  proto:
    desc: Generate ConnectRPC code from proto files
    sources:
      - proto/*.proto
    generates:
      - internal/protocol/pb/**/*.go
    cmds:
      - rm -rf internal/protocol/pb
      - cd proto && buf generate

  lint:
    desc: Run static checks
    deps: [proto]
    cmds:
      - go vet ./...
      - gofmt -l . | grep . && exit 1 || true

  test:
    desc: Run all tests
    deps: [proto]
    cmds:
      - go test -race -count=1 ./...

  build:
    desc: "Build binaries (override GOOS/GOARCH for cross-compilation)"
    deps: [proto]
    vars:
      GOOS: { sh: "echo ${GOOS:-$(go env GOOS)}" }
      GOARCH: { sh: "echo ${GOARCH:-$(go env GOARCH)}" }
    env:
      CGO_ENABLED: "0"
      GOOS: "{{.GOOS}}"
      GOARCH: "{{.GOARCH}}"
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -o {{.BUILD_DIR}}/mirumd-{{.GOOS}}-{{.GOARCH}} ./cmd/mirumd
      - go build -o {{.BUILD_DIR}}/mirumw-{{.GOOS}}-{{.GOARCH}} ./cmd/mirumw
      - cp {{.BUILD_DIR}}/mirumd-{{.GOOS}}-{{.GOARCH}} {{.BUILD_DIR}}/mirumd
      - cp {{.BUILD_DIR}}/mirumw-{{.GOOS}}-{{.GOARCH}} {{.BUILD_DIR}}/mirumw

  dev:
    desc: Generate dev TLS cert and worker keys
    cmds:
      - mkdir -p dev
      - >-
        test -f dev/server.crt ||
        openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1
        -keyout dev/server.key -out dev/server.crt
        -days 365 -nodes -subj "/CN=mirumd"
        -addext "subjectAltName=DNS:mirumd,DNS:localhost"
      - >-
        test -f dev/worker.key ||
        openssl genpkey -algorithm ed25519 -out dev/worker.key
      - >-
        test -f dev/worker.pub ||
        openssl pkey -in dev/worker.key -pubout -out dev/worker.pub

  package:
    desc: Build deb/rpm packages for all architectures
    requires:
      vars: [VERSION]
    env:
      VERSION: "{{.VERSION}}"
    cmds:
      - mkdir -p {{.DIST_DIR}}
      - for: { var: ARCHES }
        cmd: |
          task build GOOS=linux GOARCH={{.ITEM}}
          ARCH={{.ITEM}} nfpm package --packager deb --target {{.DIST_DIR}}/
          ARCH={{.ITEM}} nfpm package --packager rpm --target {{.DIST_DIR}}/
          rm {{.BUILD_DIR}}/mirumd {{.BUILD_DIR}}/mirumw

# yaml-language-server: $schema=https://taskfile.dev/schema.json
